name: FPlayer Release

on:
  push:
    tags:
      - 'player-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $propsContent = Get-Content -Path player/Directory.Build.props -Raw -Encoding UTF8
          if ($propsContent -match '<VersionPrefix>\s*([^<]+)\s*</VersionPrefix>') {
            $version = $matches[1].Trim()
          } elseif ($propsContent -match '<Version>\s*([^<]+)\s*</Version>') {
            $version = $matches[1].Trim()
          } else {
            throw 'Version not found in player/Directory.Build.props'
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Publish
        shell: pwsh
        run: ./player/scripts/package-release.ps1 -Configuration Release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FPlayer ${{ steps.version.outputs.value }}
          body: |
            ## FPlayer ${{ steps.version.outputs.value }}

            Portable Windows x64 build (self-contained, .NET not required).

            ### Download
            - **ZIP:** `FPlayer-${{ steps.version.outputs.value }}-win-x64.zip` (attached to this release)
            - Extract the archive and run `MediaPlayer.exe`

            ### Requirements
            - Windows 10 19041+ / Windows 11

            ### Changes
            See commits since the previous `player-v*` tag.
          files: |
            player/artifacts/FPlayer-${{ steps.version.outputs.value }}-win-x64.zip
          draft: false
          prerelease: false
